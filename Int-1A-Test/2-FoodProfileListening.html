<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Multiple Choice</title>
<style>
body {
  font-family: Arial, sans-serif;
  max-width: 700px;
  margin: 40px auto;
  font-size: 22px;
}

h1 { font-size: 28px; }

#question {
  margin: 30px 0;
  font-size: 24px;
}

.option-row {
  margin: 12px 0;
}

input[type="radio"] {
  transform: scale(1.2);
  margin-right: 10px;
}

button {
  font-size: 18px;
  margin: 5px;
  padding: 8px 12px;
}

#feedback {
  margin-top: 20px;
  font-weight: bold;
}

#hint {
  margin-top: 10px;
  color: #555;
}
</style>
</head>

<body>

<h1 id="title"></h1>
<p id="instructions"></p>
<p id="counter"></p>

<div id="question"></div>
<div id="options"></div>

<div>
  <button onclick="checkAnswer()">Check</button>
  <button id="hintBtn" onclick="showHint()" style="display:none;">Hint</button>
  <button id="answerBtn" onclick="showAnswer()" style="display:none;">Show Answer</button>
</div>

<div id="feedback"></div>
<div id="hint"></div>

<div style="margin-top:20px;">
  <button onclick="prev()">Previous</button>
  <button onclick="next()">Next</button>
</div>

<script>
let current = 0;
var activityData = null;

function loadQuestion() {
  const item = activityData.items[current];

  document.getElementById("title").innerText = activityData.title;
  document.getElementById("instructions").innerText = activityData.instructions;
  document.getElementById("counter").innerText = (current+1) + " / " + activityData.items.length;
  document.getElementById("question").innerText = item.question;

  document.getElementById("feedback").innerText = "";
  document.getElementById("hint").innerText = "";
  document.getElementById("hintBtn").style.display = "none";
  document.getElementById("answerBtn").style.display = "none";

  let optionsHTML = "";
  item.options.forEach(opt => {
    optionsHTML += `
      <div class="option-row">
        <label>
          <input type="radio" name="answer" value="${opt}">
          ${opt}
        </label>
      </div>
    `;
  });

  document.getElementById("options").innerHTML = optionsHTML;
}

function getSelected() {
  const radios = document.getElementsByName("answer");
  for (let r of radios) {
    if (r.checked) return r.value;
  }
  return null;
}

function checkAnswer() {
  const item = activityData.items[current];
  const val = getSelected();
  if (!val) return;

  if (val === item.answer) {
    document.getElementById("feedback").innerText = "Correct";
  } else {
    document.getElementById("feedback").innerText = "Try again";
    if (item.hint) {
      document.getElementById("hintBtn").style.display = "inline-block";
    } else {
      document.getElementById("answerBtn").style.display = "inline-block";
    }
  }
}

function showHint() {
  const item = activityData.items[current];
  document.getElementById("hint").innerText = item.hint;
  document.getElementById("answerBtn").style.display = "inline-block";
}

function showAnswer() {
  const item = activityData.items[current];
  const radios = document.getElementsByName("answer");
  for (let r of radios) {
    if (r.value === item.answer) r.checked = true;
  }
  document.getElementById("feedback").innerText = "Answer shown";
}

function next() {
  if (current < activityData.items.length - 1) {
    current++;
    loadQuestion();
  } else {
    showComplete();
  }
}

function prev() {
  if (current > 0) {
    current--;
    loadQuestion();
  }
}

function showComplete() {
  document.getElementById("question").innerText = "Completed";
  document.getElementById("options").innerHTML = "";
  document.getElementById("counter").innerText = "";
  document.getElementById("feedback").innerText = "";
  document.getElementById("hint").innerText = "";
  document.getElementById("hintBtn").style.display = "none";
  document.getElementById("answerBtn").style.display = "none";
}

function loadActivityScript() {
  var htmlFile = window.location.href.split("/").pop().split("?")[0].split("#")[0];
  var jsFile = decodeURIComponent(htmlFile).replace(/\.html?$/i, ".js");

  var script = document.createElement("script");
  script.src = "./" + encodeURIComponent(jsFile);

  script.onload = function() {
    if (!window.activityData || !window.activityData.items) {
      alert("Invalid activity data: " + jsFile + " loaded, but no activityData.items was found");
      return;
    }

    activityData = window.activityData;

    if (typeof loadQuestions === "function") {
      loadQuestions();
    }

    if (typeof loadQuestion === "function") {
      loadQuestion();
    }
  };

  script.onerror = function() {
    alert("Could not load activity data file: " + jsFile);
  };

  document.body.appendChild(script);
}

loadActivityScript();
</script>

</body>
</html>
