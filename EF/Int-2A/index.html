<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lesson Activities</title>
    <style>
        :root { color-scheme: light; }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            color: #1f2937;
        }
        .wrap {
            max-width: 1000px;
            margin: 0 auto;
            padding: 24px;
        }
        .panel {
            background: #ffffff;
            border: 1px solid #dbe2ea;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        h1 {
            margin: 0 0 8px 0;
            font-size: 28px;
        }
        .sub {
            margin: 0;
            color: #4b5563;
            font-size: 14px;
        }
        .lessons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            grid-auto-flow: row;
            gap: 14px;
        }
        .lesson-card {
            border: 1px solid #dbe2ea;
            border-radius: 12px;
            padding: 16px;
            background: #f9fafb;
        }
        .lesson-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .lesson-meta {
            color: #4b5563;
            font-size: 14px;
            margin-bottom: 12px;
        }
        .lesson-button {
            display: inline-block;
            padding: 12px 14px;
            text-decoration: none;
            background: #2563eb;
            color: #ffffff;
            border-radius: 10px;
            font-weight: bold;
        }
        .lesson-button:hover {
            background: #1d4ed8;
        }
        .empty-message {
            margin: 0;
            color: #6b7280;
        }
    </style>
</head>

</body>
</html>
