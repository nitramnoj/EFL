<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EFL Activities</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      max-width: 600px;
      text-align: center;
      padding: 30px;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    h1 {
      margin-bottom: 10px;
      font-size: 32px;
    }

    p {
      color: #4b5563;
      margin: 10px 0;
      font-size: 16px;
    }

    .note {
      margin-top: 20px;
      font-size: 14px;
      color: #6b7280;
    }

    .footer {
      margin-top: 25px;
      font-size: 12px;
      color: #9ca3af;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>EFL Activities</h1>

    <p>Interactive activities for online English lessons.</p>

    <p class="note">
      Lessons are accessed via direct links provided by your teacher.
    </p>

    <div class="footer">
      Teaching resources by Jon Martin
    </div>
  </div>
</body>
</html>
