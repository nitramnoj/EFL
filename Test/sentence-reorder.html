<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TEMPLATE - Sentence Reorder</title>
<style>
body {
  font-family: Arial, sans-serif;
  max-width: 800px;
  margin: 40px auto;
  font-size: 22px;
}

h1 { font-size: 28px; }

#answerLine {
  margin: 24px 0;
  min-height: 40px;
  padding: 10px;
  border: 1px solid #ccc;
  background: #f7f7f7;
  font-size: 24px;
}

#parts {
  margin: 24px 0;
}

.part-btn {
  font-size: 20px;
  margin: 6px;
  padding: 10px 14px;
  cursor: pointer;
}

button {
  font-size: 18px;
  margin: 5px;
  padding: 8px 12px;
}

#feedback {
  margin-top: 20px;
  font-weight: bold;
}

#correctAnswer {
  margin-top: 12px;
}
</style>
</head>

<body>

<h1 id="title"></h1>
<p id="instructions"></p>
<p id="counter"></p>

<div id="answerLine"></div>
<div id="parts"></div>

<div>
  <button onclick="checkAnswer()">Check</button>
  <button onclick="resetAnswer()">Reset</button>
  <button id="answerBtn" onclick="showAnswer()">Show Answer</button>
</div>

<div id="feedback"></div>
<div id="correctAnswer"></div>

<div style="margin-top:20px;">
  <button onclick="prev()">Previous</button>
  <button onclick="next()">Next</button>
</div>

<script>
let current = 0;
var activityData = null;
let selectedParts = [];

function clean(text) {
  return text
    .toLowerCase()
    .replace(/[.,!?]/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

function loadQuestion() {
  const item = activityData.items[current];

  document.getElementById("title").innerText = activityData.title;
  document.getElementById("instructions").innerText = activityData.instructions;
  document.getElementById("counter").innerText = (current + 1) + " / " + activityData.items.length;
  document.getElementById("feedback").innerText = "";
  document.getElementById("correctAnswer").innerText = "";
  selectedParts = [];
  renderAnswerLine();
  renderParts(item.parts);
}

function renderAnswerLine() {
  document.getElementById("answerLine").innerText = selectedParts.join(" ");
}

function renderParts(parts) {
  const container = document.getElementById("parts");
  container.innerHTML = "";

  parts.forEach((part, index) => {
    const btn = document.createElement("button");
    btn.className = "part-btn";
    btn.innerText = part;
    btn.onclick = () => addPart(index);
    btn.dataset.index = index;
    container.appendChild(btn);
  });
}

function addPart(index) {
  const buttons = document.querySelectorAll(".part-btn");
  const btn = Array.from(buttons).find(b => Number(b.dataset.index) === index);
  if (!btn || btn.disabled) return;

  selectedParts.push(btn.innerText);
  btn.disabled = true;
  renderAnswerLine();
}

function resetAnswer() {
  loadQuestion();
}

function checkAnswer() {
  const item = activityData.items[current];
  const user = clean(selectedParts.join(" "));
  const correct = clean(item.answer);

  if (!user) return;

  if (user === correct) {
    document.getElementById("feedback").innerText = "Correct";
  } else {
    document.getElementById("feedback").innerText = "Try again";
  }
}

function showAnswer() {
  const item = activityData.items[current];
  document.getElementById("correctAnswer").innerText = item.answer;
  document.getElementById("feedback").innerText = "Answer shown";
}

function next() {
  if (current < activityData.items.length - 1) {
    current++;
    loadQuestion();
  } else {
    showComplete();
  }
}

function prev() {
  if (current > 0) {
    current--;
    loadQuestion();
  }
}

function showComplete() {
  document.getElementById("answerLine").innerText = "Completed";
  document.getElementById("parts").innerHTML = "";
  document.getElementById("counter").innerText = "";
  document.getElementById("feedback").innerText = "";
  document.getElementById("correctAnswer").innerText = "";
}

function loadActivityScript() {
  const htmlFile = window.location.href.split("/").pop().split("?")[0].split("#")[0];
  const jsFile = decodeURIComponent(htmlFile).replace(/\.html?$/i, ".js");

  const script = document.createElement("script");
  script.src = encodeURI(jsFile);

  script.onload = () => {
    if (!activityData || !activityData.items) {
      alert("Invalid activity data");
      return;
    }

    if (typeof loadQuestions === "function") {
      loadQuestions();
    }

    if (typeof loadQuestion === "function") {
      loadQuestion();
    }
  };

  script.onerror = () => {
    alert("Could not load " + jsFile);
  };

  document.body.appendChild(script);
}

loadActivityScript();

</script>

</body>
</html>
